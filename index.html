<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI产品经理 · 自学教材</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--card2:#222639;--border:#2d3148;--text:#e4e6f0;--text2:#9499b3;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--orange:#fdcb6e;--red:#e17055;--blue:#74b9ff;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

.progress-bar-top{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50}
.progress-bar-top .row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.progress-bar-top .stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.progress-bar-top .stat .val{font-weight:700;color:var(--accent2);font-size:15px}
.progress-bar-top .bar-wrap{flex:1;min-width:120px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar-top .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}

.header{text-align:center;padding:20px 16px 0}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--text2);font-size:13px;margin-top:4px}

.tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;min-width:0;padding:10px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

.page{display:none;padding:0 16px 16px}
.page.active{display:block}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .icon{font-size:18px}

.slider-group{margin-bottom:14px}
.slider-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slider-label span{font-size:13px;color:var(--text2)}
.slider-label .score{font-size:15px;font-weight:700;color:var(--accent2);min-width:20px;text-align:right}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:var(--border);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--accent2)}
.radar-wrap{display:flex;justify-content:center;margin:16px 0}
.radar-wrap canvas{max-width:100%}
.analysis{font-size:13px;color:var(--text2);line-height:1.8;padding:12px;background:var(--card2);border-radius:8px}
.analysis strong{color:var(--orange)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--text)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{opacity:.85}
.btn-sm{padding:6px 14px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select,.filter-bar button{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer}
.filter-bar select:focus{outline:none;border-color:var(--accent)}

.quiz-area{min-height:200px}
.quiz-timer{font-size:28px;font-weight:700;color:var(--accent2);text-align:center;margin:12px 0}
.quiz-question{font-size:16px;font-weight:600;line-height:1.6;margin-bottom:16px}
.quiz-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.quiz-tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}
.tag-tech{background:#6c5ce733;color:var(--accent2)}
.tag-product{background:#00b89433;color:var(--green)}
.tag-biz{background:#fdcb6e33;color:var(--orange)}
.tag-behavior{background:#e1705533;color:var(--red)}
.tag-trend{background:#74b9ff33;color:var(--blue)}
.quiz-answer{background:var(--card2);border-radius:8px;padding:14px;margin:12px 0;font-size:13px;line-height:1.8;color:var(--text2)}
.quiz-answer strong{color:var(--green)}
.stars{color:var(--orange);letter-spacing:2px}
.score-row{display:flex;align-items:center;gap:12px;margin:12px 0}
.score-row label{font-size:13px;color:var(--text2);white-space:nowrap}
.score-row input[type=range]{flex:1}
.score-row .val{font-size:14px;font-weight:700;color:var(--accent2);min-width:20px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin:16px 0}
.stat-item{background:var(--card2);border-radius:8px;padding:14px;text-align:center}
.stat-item .num{font-size:24px;font-weight:700;color:var(--accent2)}
.stat-item .lbl{font-size:11px;color:var(--text2);margin-top:4px}

.path-card{cursor:pointer;transition:all .2s}
.path-card:hover{border-color:var(--accent)}
.path-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.path-header .left{flex:1}
.path-header .left strong{font-size:15px}
.path-header .left .desc{font-size:12px;color:var(--text2);margin-top:2px}
.path-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.badge-not-started{background:var(--border);color:var(--text2)}
.badge-learning{background:var(--orange)33;color:var(--orange)}
.badge-mastered{background:var(--green)33;color:var(--green)}
.badge-quiz{background:var(--accent)33;color:var(--accent2)}
.path-progress{height:6px;background:var(--border);border-radius:3px;margin:10px 0;overflow:hidden}
.path-progress-bar{height:100%;border-radius:3px;transition:width .3s}
.path-meta{display:flex;gap:12px;font-size:12px;color:var(--text2)}
.path-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.path-detail.open{display:block}

.section-block{margin-bottom:20px}
.section-label{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.section-label .dot{width:6px;height:6px;border-radius:50%;background:var(--accent2)}
.section-content{font-size:14px;line-height:1.9;color:var(--text2)}
.section-content p{margin-bottom:10px}
.section-content em{color:var(--orange);font-style:normal;font-weight:600}
.section-content strong{color:var(--text)}

.collapse-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 0;font-size:13px;font-weight:600;color:var(--accent2);border:none;background:none;width:100%;text-align:left}
.collapse-toggle:hover{color:var(--accent)}
.collapse-toggle .arrow{font-size:10px;transition:transform .2s}
.collapse-toggle .arrow.open{transform:rotate(90deg)}
.collapse-body{display:none;padding:4px 0 8px}
.collapse-body.open{display:block}

.think-item{font-size:13px;line-height:1.8;color:var(--text2);padding:6px 0 6px 16px;border-left:2px solid var(--accent);margin-bottom:6px}
.think-item strong{color:var(--orange)}

.memory-item{font-size:13px;line-height:1.6;color:var(--text2);padding:6px 12px;background:var(--card2);border-radius:6px;margin-bottom:4px}
.memory-item::before{content:"✦ ";color:var(--accent2)}

.path-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

.checkin-section{margin-bottom:20px}
.checkin-section h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--accent2)}
.kp-card{background:var(--card2);border-radius:8px;padding:12px;margin-bottom:8px;font-size:13px;line-height:1.6}
.kp-card .kp-source{font-size:11px;color:var(--text2);margin-top:4px}
.checkin-btn{width:100%;padding:14px;font-size:16px;margin:16px 0}
.streak-display{text-align:center;padding:20px;margin:12px 0}
.streak-num{font-size:48px;font-weight:700;color:var(--green)}
.streak-label{font-size:13px;color:var(--text2);margin-top:4px}
.history-list{max-height:300px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item:last-child{border:none}
.history-date{color:var(--text2)}
.history-status{padding:3px 8px;border-radius:4px;font-size:11px}
.history-done{background:var(--green)22;color:var(--green)}
.history-partial{background:var(--orange)22;color:var(--orange)}

.footer{text-align:center;padding:24px 16px}
.reset-btn{background:transparent;border:1px solid var(--red);color:var(--red);padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer}
.reset-btn:hover{background:var(--red);color:#fff}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:420px;width:90%}
.modal h3{margin-bottom:12px;font-size:16px}
.modal p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.ai-modal textarea{width:100%;min-height:120px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:13px;line-height:1.6;resize:vertical;font-family:inherit}
.ai-modal textarea:focus{outline:none;border-color:var(--accent)}
.ai-modal .ai-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

.quiz-result{margin-top:16px}
.quiz-result h3{text-align:center;margin-bottom:16px}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.result-item:last-child{border:none}
.result-item .wrong-mark{color:var(--red);font-weight:700;margin-left:8px}
.result-item .kp-link{color:var(--accent2);cursor:pointer;text-decoration:underline;font-size:12px;margin-left:8px}

.wrong-book-item{background:var(--card2);border-radius:8px;padding:12px;margin-bottom:8px}
.wrong-book-item .q-text{font-size:13px;font-weight:600;margin-bottom:6px}
.wrong-book-item .q-meta{display:flex;gap:8px;margin-bottom:6px}
.wrong-book-item .q-score{font-size:12px;color:var(--red)}
.wrong-book-item .q-kp{font-size:12px;color:var(--accent2);cursor:pointer;text-decoration:underline}

.fade-in{animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){.header h1{font-size:18px}.tab{font-size:12px;padding:8px 4px}.card{padding:12px}.quiz-timer{font-size:22px}.path-badges{gap:4px}.section-content{font-size:13px}}
</style>
</head>
<body>

<div class="progress-bar-top" id="top-progress">
  <div class="row">
    <div class="stat">📚 <span class="val" id="top-mastered">0</span>/12 板块</div>
    <div class="bar-wrap"><div class="bar-fill" id="top-bar" style="width:0%"></div></div>
    <div class="stat">🔥 <span class="val" id="top-streak">0</span>天</div>
    <div class="stat">🎯 <span class="val" id="top-accuracy">0</span>%</div>
  </div>
</div>

<div class="header">
  <h1>AI产品经理 · 自学教材</h1>
  <p>叙事 · 案例 · 思考 · 打卡</p>
</div>

<div class="tabs">
  <div class="tab active" data-tab="path">学习路径</div>
  <div class="tab" data-tab="quiz">面试自测</div>
  <div class="tab" data-tab="wrong">错题本</div>
  <div class="tab" data-tab="assess">能力自检</div>
  <div class="tab" data-tab="checkin">每日打卡</div>
</div>

<div class="page active" id="page-path">
  <div id="path-list"></div>
</div>

<div class="page" id="page-quiz">
  <div class="card">
    <div class="card-title"><span class="icon">🎯</span> 面试自测</div>
    <div id="quiz-setup">
      <div class="filter-bar">
        <select id="q-category"><option value="all">全部类别</option><option value="tech">技术理解</option><option value="product">产品设计</option><option value="biz">商业化</option><option value="behavior">行为/项目</option><option value="trend">行业趋势</option></select>
        <select id="q-diff"><option value="0">全部难度</option><option value="3">★★★</option><option value="4">★★★★</option><option value="5">★★★★★</option></select>
        <button class="btn btn-primary btn-sm" onclick="startQuiz()">开始测试</button>
      </div>
      <div style="font-size:13px;color:var(--text2)">题库共35道题，选择类别和难度后开始</div>
    </div>
    <div id="quiz-play" class="quiz-area" style="display:none"></div>
  </div>
</div>

<div class="page" id="page-wrong">
  <div class="card">
    <div class="card-title"><span class="icon">❌</span> 错题本</div>
    <div id="wrong-list"></div>
  </div>
</div>

<div class="page" id="page-assess">
  <div class="card">
    <div class="card-title"><span class="icon">📊</span> 八维能力自评</div>
    <div id="sliders"></div>
    <div class="radar-wrap"><canvas id="radar" width="320" height="320"></canvas></div>
    <div class="analysis" id="analysis">拖动滑块进行自评，雷达图将实时更新</div>
    <div style="text-align:center;margin-top:14px">
      <button class="btn btn-primary" onclick="saveAssess()">保存自评</button>
    </div>
  </div>
</div>

<div class="page" id="page-checkin">
  <div class="card">
    <div class="card-title"><span class="icon">🔥</span> 每日打卡</div>
    <div class="streak-display">
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">连续打卡天数</div>
    </div>
  </div>
  <div class="card checkin-section">
    <h3>📖 今日知识点</h3>
    <div id="today-kps"></div>
  </div>
  <div class="card checkin-section">
    <h3>🎯 今日面试题</h3>
    <div id="today-quiz"></div>
  </div>
  <div style="text-align:center">
    <button class="btn btn-green checkin-btn" id="checkin-btn" onclick="doCheckin()">完成今日打卡</button>
  </div>
  <div class="card" style="margin-top:16px">
    <div class="card-title"><span class="icon">📋</span> 打卡历史</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="footer">
  <button class="reset-btn" onclick="showResetModal()">重置所有数据</button>
</div>

<div class="modal-overlay" id="reset-modal">
  <div class="modal">
    <h3>确认重置</h3>
    <p>将清除所有自评分数、学习进度、打卡记录。此操作不可撤销。</p>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeResetModal()">取消</button>
      <button class="btn btn-primary" style="background:var(--red)" onclick="doReset()">确认重置</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="ai-modal">
  <div class="modal ai-modal">
    <h3 id="ai-modal-title">问AI</h3>
    <textarea id="ai-modal-text"></textarea>
    <div class="ai-actions">
      <button class="btn btn-primary btn-sm" onclick="copyAiPrompt()">📋 复制Prompt</button>
      <button class="btn btn-outline btn-sm" onclick="openChatGPT()">🟢 ChatGPT</button>
      <button class="btn btn-outline btn-sm" onclick="openKimi()">🔵 Kimi</button>
      <button class="btn btn-outline btn-sm" onclick="closeAiModal()">关闭</button>
    </div>
  </div>
</div>

<script>
var DIMS = [
  {id:'tech', name:'AI技术理解力', desc:'理解模型原理、技术边界判断'},
  {id:'product', name:'产品设计力', desc:'需求转化、体验设计、场景洞察'},
  {id:'biz', name:'商业化能力', desc:'商业闭环、成本控制、定价策略'},
  {id:'data', name:'数据能力', desc:'数据闭环、标注管理、效果评估'},
  {id:'translate', name:'技术翻译力', desc:'业务需求↔技术方案双向翻译'},
  {id:'agent', name:'人机协同设计', desc:'20-60-20法则、Agent工作流设计'},
  {id:'ethics', name:'伦理架构力', desc:'透明性、可控性、可逆性设计'},
  {id:'interview', name:'面试实战力', desc:'项目表达、行为问题、压力应对'}
];

var QUESTIONS = [
  {id:1,cat:'tech',q:'解释Transformer架构的核心原理及对大模型发展的影响',diff:3,ans:'注意力机制：允许模型关注输入序列中所有位置的关系，突破RNN的顺序依赖；并行计算：自注意力机制支持GPU并行训练，大幅提升效率；长文本依赖建模：解决长距离依赖问题；推动BERT/GPT发展：Transformer是现代大模型的基础架构',pathId:6},
  {id:2,cat:'tech',q:'RAG vs Fine-tuning怎么选？各自适用场景？',diff:4,ans:'RAG适用场景：需要最新信息、需要可溯源的回答、知识频繁更新；Fine-tuning适用场景：需要改变模型行为风格、领域专业术语学习、特定任务优化；关键决策：常结合使用——先Fine-tuning改行为，再RAG补知识',pathId:7},
  {id:3,cat:'tech',q:'什么是数据漂移？如何监控和应对？',diff:4,ans:'定义：输入数据的统计分布随时间发生变化，导致模型性能下降；监控方法：PSI指标监控（Population Stability Index）、特征分布监控、预测分布监控；应对策略：增量标注+模型重训练、数据版本管理、A/B测试验证新模型',pathId:7},
  {id:4,cat:'tech',q:'解释模型幻觉，产品设计层面如何管理？',diff:3,ans:'幻觉定义：模型生成看似合理但实际错误的内容；产品设计管理：置信度展示（让用户知道AI的确定程度）、人工复核通道（关键决策必须人工确认）、免责声明（明确AI输出仅供参考）、规则引擎兜底（高风险场景用规则约束AI输出）',pathId:8},
  {id:5,cat:'tech',q:'什么是MoE？优势和挑战？',diff:4,ans:'MoE（Mixture of Experts）：混合专家系统，通过路由机制动态选择激活哪些子模型（专家）；优势：参数效率高——总参数多但每次推理只激活部分，降低推理成本；挑战：路由策略复杂、负载均衡困难、训练不稳定、需要大量数据',pathId:7},
  {id:6,cat:'tech',q:'如何平衡模型性能和推理成本？',diff:3,ans:'量化：4bit/8bit量化降低精度换取速度和成本；端侧+云侧混合部署：简单任务端侧处理，复杂任务云端处理；模型蒸馏与剪枝：大模型蒸馏为小模型，剪枝去除冗余参数；Prompt工程：优化提示词降低token消耗',pathId:7},
  {id:7,cat:'product',q:'如何将用户需求转化为AI技术需求？以"智能客服情绪识别"为例',diff:3,ans:'需求拆解：识别情绪→分类情绪→触发响应策略；技术可行性评估：NLP情绪分类准确率、实时性要求、多语言支持；数据需求：标注数据集（情绪标签+对话文本）、badcase定义；指标定义：准确率、F1、响应延迟；MVP范围：先做正面/负面二分类，再扩展多分类',pathId:5},
  {id:8,cat:'product',q:'如何设计AI产品的容错机制？',diff:4,ans:'置信度阈值：模型输出置信度低于阈值时触发备选方案；人工复核通道：关键场景必须有人工确认环节；规则引擎兜底：AI无法处理时回退到规则系统；反脆弱设计：IF置信度<85% THEN转人工，让系统在错误中学习而非崩溃',pathId:8},
  {id:9,cat:'product',q:'AI产品需求优先级怎么排？结合Kano模型说明',diff:3,ans:'基本需求（必备型）：必须满足的底线功能，缺失则用户不满；性能需求（期望型）：功能越好用户越满意，如准确率提升；兴奋需求（魅力型）：超出预期的创新功能；AI特殊性：可行性评估需包含模型能力限制，不是所有需求技术都能实现',pathId:5},
  {id:10,cat:'product',q:'如何设计AI Agent的多级工作流？',diff:4,ans:'20-60-20法则：20%人工启动→60%AI自主处理→20%人工兜底；初级AI处理80%常规任务；复杂场景触发专家模型；争议/高风险场景转人工；知识图谱持续优化：每次人工处理的结果回流到知识库',pathId:11},
  {id:11,cat:'product',q:'如何评估AI产品场景是否是"黄金场景"？',diff:3,ans:'痛点真实性：用户是否真的在用低效方式解决此问题；AI不可替代性：AI相比传统方案是否有数倍体验提升；商业闭环可量化：能否清晰算出投入产出比',pathId:5},
  {id:12,cat:'product',q:'AI产品从Demo到规模化营收的3个必破卡点？',diff:4,ans:'场景闭环：从单点功能到全链路闭环，用户不会为半成品付费；单位经济模型：从烧钱到盈利可复制，推理成本必须可控；规模化交付：从定制化到标准化，否则无法规模化',pathId:9},
  {id:13,cat:'biz',q:'B端和C端AI产品的商业化策略有什么不同？',diff:3,ans:'B端策略：按成果付费、ROI可视化、续费率80%+、决策链长但客单价高；C端策略：订阅制、付费率1-4%、社交传播驱动增长、情绪价值定价；关键差异：B端卖效率，C端卖体验',pathId:9},
  {id:14,cat:'biz',q:'如何控制AI产品的推理成本？',diff:3,ans:'端侧+云侧混合部署：简单请求端侧处理，复杂请求云端处理；量化：4bit/8bit量化降低计算量；Prompt工程：优化提示词减少token消耗；案例：某产品月推理成本从2000元降至300元',pathId:9},
  {id:15,cat:'biz',q:'AI产品的定价逻辑是什么？',diff:4,ans:'B端定价：按节省人力成本定价，客户能算出ROI；C端定价：按情绪价值/效率提升定价，用户愿为体验付费；API定价：按token计费，输入输出分别定价；定价陷阱：不能按成本定价，要按价值定价',pathId:9},
  {id:16,cat:'biz',q:'为什么67%的AI创新项目失败？核心原因？',diff:3,ans:'核心原因：商业闭环缺失；技术可行≠商业可行；具体表现：缺场景闭环（技术有了但没人用）、经济模型不通（推理成本高于收入）、伪需求（想象的需求非真实需求）',pathId:9},
  {id:17,cat:'biz',q:'AI产品ToB优先的逻辑是什么？',diff:3,ans:'有算法没数据→ToB获取数据：B端客户有数据积累；获客成本高→B端热启动：B端一个客户就能覆盖成本；技术不成熟→B端容错率高：B端愿意为早期技术付费并包容不足',pathId:5},
  {id:18,cat:'biz',q:'如何设计AI产品的数据飞轮？',diff:4,ans:'飞轮逻辑：用户行为数据→优化模型→提升体验→更多用户→更多数据；关键要素：闭环（数据必须回流到模型优化）、自动化（数据收集-标注-训练-部署全链路自动化）；冷启动：先用规则/人工标注积累初始数据，再切换到自动飞轮',pathId:9},
  {id:19,cat:'behavior',q:'描述你做过的最成功的AI产品，成功指标是什么？',diff:3,ans:'STAR法则：Situation背景→Task任务→Action行动→Result结果；指标需量化：自动解决率+15%、人工转接率-20%、用户满意度+12%等；验证方式：A/B测试验证，而非主观判断',pathId:10},
  {id:20,cat:'behavior',q:'你在AI项目中遇到的最大困难是什么？如何解决的？',diff:4,ans:'避坑：不能只说"协调资源难"这种万能答案；必须包含：技术决策困难+分析过程+权衡逻辑+结果验证；体现深度：展示你在不确定性下做决策的能力',pathId:10},
  {id:21,cat:'behavior',q:'如果让你重来，你会在哪个节点做出不一样的判断？',diff:5,ans:'必须说具体决策：不能泛泛而谈；反思逻辑：当时为什么做那个决定、信息差在哪里；替代方案：如果重来会怎么做、为什么；预期差异：新方案预期会有什么不同结果；核心：体现复盘深度而非后悔',pathId:10},
  {id:22,cat:'behavior',q:'如何在技术不确定性很高的情况下推进项目？',diff:4,ans:'不确定性拆分：将大不确定性拆成可验证的小不确定性；中间节点管理：设置可验证的里程碑，逐步降低不确定性；盖尔定律：从简单系统开始，逐步演进到复杂系统；可演进性设计：架构设计时预留扩展空间',pathId:4},
  {id:23,cat:'behavior',q:'你如何辨别"想象的需求"和"真实需求"？',diff:3,ans:'技术能否稳定支持：如果技术做不到，需求就是想象；体验是否超越原产品数倍：只有数倍提升才能改变用户习惯；用户是否已在用低效方式解决：如果没人尝试解决，可能不是真需求',pathId:5},
  {id:24,cat:'behavior',q:'举例说明你做过的失败决策，学到了什么？',diff:4,ans:'必须说自己的决策：不能推给团队或环境；分析原因：决策时的信息、判断逻辑、盲区；提炼方法论：从失败中抽象出可复用的原则；后续应用：这个方法论在后续项目中如何应用',pathId:10},
  {id:25,cat:'trend',q:'2025-2026年AI产品经理最核心的能力变化是什么？',diff:3,ans:'从功能设计→能力探索+价值架构：不再是堆功能，而是探索AI能力边界；概率思维框架：接受不确定性，设计容错机制；技术-业务双向翻译：能将业务需求翻译为技术方案，也能将技术限制翻译为业务语言',pathId:1},
  {id:26,cat:'trend',q:'71%的AI PM岗位不需要真懂AI，你怎么看？',diff:3,ans:'数据来源：200份JD拆解结果；识别方法：看JD是否有"模型评估/badcase分析"等关键词；核心观点：行业know-how>技术深度，但完全不懂技术会失去判断力',pathId:1},
  {id:27,cat:'trend',q:'大模型时代AI PM和传统PM的本质差异？',diff:3,ans:'决策逻辑：确定性→概率性（传统PM做确定性功能，AI PM管理概率性输出）；核心驱动：功能→数据-模型-场景（传统PM驱动功能迭代，AI PM驱动数据飞轮）；成功定义：DAU→数据飞轮（传统看DAU，AI看数据质量和飞轮效应）',pathId:1},
  {id:28,cat:'trend',q:'你怎么看AI Agent的商业化前景？',diff:4,ans:'现状：技术狂飙但商业窘境；黄金场景三法则：痛点真实+AI不可替代+商业闭环可量化；路径：从单点功能→全链路闭环；关键：Agent需要找到真正的黄金场景，而非技术自嗨',pathId:11},
  {id:29,cat:'trend',q:'如何看待AI产品的伦理问题？',diff:3,ans:'三大原则：透明性（用户知道在和AI交互）、可控性（人可以随时接管）、可逆性（AI的决策可以被撤销）；合规框架：欧盟AI法案+中国合规指南；实践方法：偏见检测+合规沙盒',pathId:8},
  {id:30,cat:'trend',q:'你认为AI产品经理这个岗位3年后会怎样？',diff:4,ans:'分化趋势：平台PM（做AI基础设施）/应用PM（做AI应用）/行业PM（做行业AI解决方案）；护城河：行业know-how是真正的护城河，而非AI技术本身；终局：会用AI的PM替代不会用的PM',pathId:1},
  {id:31,cat:'tech',q:'AI Agent的四大核心能力是什么？你觉得自己哪个最弱？',diff:3,ans:'四大核心能力：任务拆解/工具调用/评测可观测性/生产环境能力；说出自己的短板+改进计划',pathId:12},
  {id:32,cat:'product',q:'什么是FDE岗位？和传统PM有什么区别？',diff:3,ans:'FDE=Field Deployment Engineer，兼顾产品思维+AI落地交付；区别=FDE要做现场部署+客户适配+效果验证',pathId:12},
  {id:33,cat:'tech',q:'你做RAG项目，检索策略是什么？召回率多少？badcase怎么处理？',diff:4,ans:'粗召回(Top-K向量检索)+精排(Rerank)；召回率需量化；badcase=分析错误类型+补充训练数据+调整检索策略',pathId:12},
  {id:34,cat:'tech',q:'AI Agent框架怎么选？LangChain/LangGraph/Pydantic AI/Claude SDK各适合什么场景？',diff:4,ans:'Demo→LangChain/复杂工作流→LangGraph/轻量业务→Pydantic AI/发挥模型能力→Claude SDK；核心=先想清楚问题再选最简方案',pathId:7},
  {id:35,cat:'tech',q:'Agent推理延迟太高怎么优化？',diff:3,ans:'砍(限制思考)/控(摘要提取)/分(大小模型协同)/存(缓存)/并(并行执行)',pathId:7}
];

var CAT_NAMES = {tech:'技术理解',product:'产品设计',biz:'商业化',behavior:'行为/项目',trend:'行业趋势'};
var CAT_CLASSES = {tech:'tag-tech',product:'tag-product',biz:'tag-biz',behavior:'tag-behavior',trend:'tag-trend'};

var PATHS = [
  {id:1,name:'AI产业结构与PM定位',desc:'理解AI产业链各环节及PM的定位与价值',qIds:[25,26,27],why:'在入行之前，你得先搞清楚AI产业长什么样，你在哪个位置，你的价值在哪里。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>AI产业像一座大楼。<strong>一楼是基础平台</strong>——提供算力、算法框架的公司，比如做GPU的英伟达、做深度学习框架的百度飞桨。<strong>二楼是AI+行业</strong>——用AI技术创造新业务的公司，比如智能客服公司、AI外呼公司。<strong>三楼是行业+AI</strong>——本来就有行业积累，用AI赋能的公司，比如智能家居、智能车载。</p><p>你在哪一层，决定了你需要什么能力。一楼的PM要懂底层技术框架；二楼的PM要擅长需求挖掘和项目管理；三楼的PM要深谙行业理解。</p><p>AI产品经理还有个"真假"问题。有人拆了200份AI PM的招聘JD，发现<em>71%的岗位其实不需要你真懂AI</em>——它们要么是传统PM加了AI标签蹭热度，要么只需要你做"翻译官"把需求翻译给技术团队。怎么识别真AI PM？看JD里有没有"模型评估""badcase分析""技术方案评审"这些词。有，就是真AI PM。</p><p>还有一个残酷真相：<em>行业know-how比技术深度更能决定你的薪资上限</em>。金融、医疗、自动驾驶的AI PM薪资中位数比泛AIGC高出50%。因为一个懂金融风控逻辑的PM，3个月培养不出来；但一个只会写Prompt的PM，市面上一抓一大把。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>京东云言犀智能客服系统迭代时，产品经理需要同时优化三个变量：标注数据质量（准确率）、模型结构（从BERT迁移到GPT-3.5）、业务场景适配（金融vs零售）。这三个变量的耦合度远超传统产品，<em>70%的迭代时间花在解决数据漂移问题上</em>，只有30%用于功能开发。</p></div></div>',think:['如果你现在转行做AI PM，你现有的行业经验在AI产业三层模型中属于哪一层？怎么利用？','你觉得"真AI PM"和"半AI PM"哪个更适合你当前阶段？为什么？'],memory:['AI产业三层模型：一楼基础平台（英伟达/飞桨）→二楼AI+行业（智能客服/外呼）→三楼行业+AI（智能家居/车载）','71%的AI PM岗位不需要真懂AI：真AI PM 29%、半AI PM 42%、伪AI PM 29%','识别真AI PM看JD关键词：模型评估/badcase分析/技术方案评审','行业know-how比技术深度更值钱：金融/医疗AI PM薪资比泛AIGC高50%','AI PM核心差异：确定性→概率思维，功能→数据闭环，DAU→数据飞轮']},
  {id:2,name:'系统化思维与物理思维',desc:'用系统思维和物理思维分析AI产品问题',qIds:[22],why:'AI产品复杂度极高，如果没有系统化思维，你会被细节淹没。这是最底层的元能力。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>蜗牛老师（图灵机器人产品负责人，16年经验）说了一句话：<em>用简单模拟复杂，不用复杂追求复杂</em>。</p><p>什么意思？当你面对一个复杂问题时，不要试图一次性理解所有细节。先找到最核心的子系统，理解它，再逐步叠加条件。</p><p>这就像物理学。物理学家不会一上来就研究真实世界的所有摩擦力、空气阻力。他们先研究"真空中的球形鸡"——最简化的模型，抓住主要矛盾，再逐步加入复杂条件。</p><p>具体怎么做？用"最小子系统法"：不断去掉弱关联的子系统，直到剩下的子系统之间联系极强——这就是核心框架。<em>系统框架不是事实，是我们用来解释事实的理论</em>。</p><p>还有一个关键区分：经验vs方法。<em>经验易学易用过时快，方法难学但泛用性强</em>。判断标准很简单：能不能跨场景使用？柯达的失败经验只能用在相机行业，但"最小子系统法"可以用在任何行业。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>柯达是怎么被打败的？大多数人会说"数码相机"。但仔细分析：柯达1975年就发明了数码相机！真正打败柯达的是<em>打印机</em>——即拍即打革新了冲洗业务。用物理思维分析：蒸发掉所有相同点后，柯达的核心业务不是"相机"，是"影像冲洗"。打印机直接颠覆了冲洗这个最小子系统。</p><p>另一个例子：iPhone vs 诺基亚。蒸发掉所有相同点（都能打电话、发短信、上网），区别只剩一个——<em>物理键盘vs虚拟键盘（多点触控）</em>。诺基亚的物理键盘是强关联子系统，它锁死了手机形态；iPhone去掉物理键盘后，整个产品形态被释放了。</p></div></div>',think:['用最小子系统法分析你现在做的产品/项目，核心子系统是什么？去掉它还成立吗？','你工作中有哪些是"经验"，哪些是"方法"？怎么把经验提炼成方法？'],memory:['核心原则：用简单模拟复杂，不用复杂追求复杂','最小子系统法：不断去掉弱关联子系统，直到剩下的联系极强=核心框架','经验vs方法：经验易学易用过时快，方法难学但可跨场景复用','系统框架不是事实，是我们用来解释事实的理论','案例：柯达被打印机打败（不是数码相机），iPhone去掉物理键盘释放产品形态']},
  {id:3,name:'四大AI思维与心力四力',desc:'掌握AI产品经理的四大思维模型和心力框架',qIds:[23,27],why:'思维模型决定你看到什么机会、做什么选择。AI时代的思维和传统产品完全不同。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>连诗路（《AI赋能》作者）总结了四种AI产品经理独有的思维方式：</p><p><strong>多样化思维</strong>——多角度考察同一个需求。比如智能电视，从年轻人角度是娱乐中心，从老年人角度是戏曲播放器，从厂商角度是数据入口。同一个产品，不同角度看到完全不同的需求。</p><p><strong>差异化思维</strong>——在行业内做到独树一帜。注意，差异化可能以成本为代价。商汤科技选择纵向穿透（人脸识别→物品识别→安防/银行/新零售），每深入一个行业都需要大量投入，但一旦建立壁垒，竞争对手很难复制。</p><p><strong>穿透思维</strong>——AI技术最大的特点就是跨领域能力。语音识别公司不能只做识别，要横向穿透到语义理解（光识别出文字不够，要理解意思）。也可以纵向穿透：把一项技术在一个行业里做深做透。</p><p><strong>大道思维</strong>——选的赛道要足够长、足够宽。开一家杂货店是生意，开一千家店是大道。<em>最优商业模式：让竞争对手最赚钱的东西到你这里没办法赚钱，你赚他想象不到的钱</em>。</p><p>心力四力是连诗路对产品经理"内功"的总结：</p><p><strong>认知力</strong>——辨别真需求vs伪需求的能力。智能灯泡用App开灯就是伪需求——效率不如传统开关。辨别标准：技术能否稳定支持+体验是否超越原产品数倍。</p><p><strong>方法论力</strong>——在困境中磨炼出来的能力。淘宝战胜易趣，不是因为淘宝更聪明，是因为在"商家从少到多"的困境中磨出了方法论。</p><p><strong>迭代力</strong>——初心不动、随机而动。市场在变，用户在变，19年前的裁缝店思路不适用于2019年的电商。但核心使命不能变，变得是方法。</p><p><strong>验证力</strong>——知行合一。不是"我觉得方向对"，而是从用户增长数据、商业指标中验证。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>智能电视的穿透思维案例：某电视厂商最初做语音遥控——用语音代替遥控器按键。然后发现白天在家看电视的大多是老年人，于是针对老年人优化戏曲内容。再进一步，加入MEMC画质增强技术，让戏曲画面更流畅。从<em>语音遥控→画质优化→老年内容</em>，这就是纵向穿透。</p><p>淘宝vs易趣的方法论力案例：易趣是外资背景，用成熟市场的方法论运营中国电商；淘宝从零开始，在"商家不愿来"的困境中摸索出了免费开店+支付宝担保交易的方法论。<em>困境中磨出来的方法论，比成熟市场搬过来的更扎实</em>。</p></div></div>',think:['你现在做的产品/项目，用穿透思维还能延伸到什么场景？','回顾你最近一次失败，是认知力、方法论力、迭代力还是验证力的短板？'],memory:['多样化思维=多角度考察同一个需求（智能电视：年轻人=娱乐中心，老年人=戏曲播放器）','差异化思维=在行业内独树一帜，但可能以成本为代价','穿透思维=AI技术跨领域迁移：横向（语音→语义）或纵向（人脸识别→安防→银行）','大道思维=赛道足够长足够宽，做改变社会形态的产品','认知力=辨别真需求vs伪需求（智能灯泡App开灯=伪需求，效率不如传统开关）','方法论力=在困境中磨炼出来的能力（淘宝在"商家从少到多"中磨出方法论）','迭代力=初心不动、随机而动，不以昨日眼光理解今日用户','验证力=知行合一，从用户增长和商业指标中验证方向','成功过的PM更容易把"想象的需求"当真实需求']},
  {id:4,name:'可演进性与盖尔定律',desc:'理解产品可演进性设计原则和盖尔定律',qIds:[22],why:'90%的AI产品失败是因为"直奔主题"。这个板块教你如何避免这个坑。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>盖尔定律说：<em>一个切实可行的复杂系统，势必从很多个切实可行的简单系统发展而来</em>。从一开始就不切实可行的系统，后面的修修补补也无法让它切实可行。</p><p>翻译成大白话：别想一步到位。先做一个能跑的简单系统，再逐步变复杂。</p><p>这和大多数人的直觉相反。很多团队一上来就想做"AI投资研究系统""AI医疗诊断系统"——直奔主题，结果90%都失败了。</p><p>正确的做法是什么？鲍捷博士（文因互联CEO）提出了AI产品交付四层：<strong>零件→工具→解决方案→系统</strong>。先做零件（一个能用的功能），再把零件组合成工具，再把工具组合成解决方案，最后从多个解决方案中总结出系统。<em>好的产品是总结出来的，不是设计出来的</em>。</p><p>还有一个关键概念：<em>AI是蛋糕上的樱桃，基础业务系统才是蛋糕本身</em>。没有蛋糕，樱桃放哪？很多AI产品失败，不是因为AI不好，是因为没有基础业务系统。</p><p>中间节点管理也很重要。最大风险不是技术不行，是耐心耗尽前能否达到中间节点。每个中间节点都要有可衡量的成果，让团队看到进展。</p><p>康威定律也值得记住：产品结构映射团队结构。可演化的产品需要可演化的团队。如果你的团队是刚性的，你的产品也不可避免是刚性的。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>雅虎不是一开始就做门户的。它从分类目录开始——就是简单的网页链接整理。这个简单系统切实可行，用户真的在用。然后逐步加入搜索、邮件、新闻，最终成为门户。AT&T花了600亿想一步到位做门户，失败了。</p><p>Pinterest的故事更有意思。它最初想做电商导购，失败了。然后转向图片分享，做大了。再回归导购，这次成功了。<em>先做解决方案（图片分享），从多个解决方案中总结出系统（导购+分享+购买闭环）</em>。</p><p>出门问问也是：先做语音搜索工具（零件），再做智能手表（工具），再做车载系统（解决方案），最后做全场景语音交互（系统）。每个阶段都是上一个阶段的自然延伸。</p></div></div>',think:['如果你现在要做一款AI产品，最简单的"零件"是什么？能不能在一周内做出来？','你见过哪些"直奔主题"失败的AI产品？如果用可演进性思维，应该怎么做？'],memory:['盖尔定律=复杂系统必须从切实可行的简单系统开始，无法自顶向下设计','交付四层：零件（一个功能）→工具（功能组合）→解决方案（工具组合）→系统（从方案中总结）','AI是蛋糕上的樱桃，基础业务系统才是蛋糕——没有蛋糕樱桃放哪？','最大风险不是技术不行，是耐心耗尽前能否达到中间节点','好的产品是总结出来的，不是设计出来的','康威定律=产品结构映射团队结构，可演化的产品需要可演化的团队']},
  {id:5,name:'需求发现与场景评估',desc:'掌握AI产品需求发现和场景评估方法论',qIds:[9,11,17,23],why:'AI产品最怕"拿着锤子找钉子"。这个板块教你如何找到真正值得做的场景。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>找需求有六种数据挖掘方法，但不用死记。核心思路就一个：从数据中发现用户行为的隐藏模式。</p><p><strong>关联分析</strong>——发现"买了A的人也买B"。最经典的例子是沃尔玛的"尿布与啤酒"：年轻爸爸被派去买尿布，顺手买啤酒。这个发现让两种商品放在一起，销量都涨了。</p><p><strong>序列发现</strong>——发现"先做A的人之后会做B"。会员先买婴儿用品，半年后买幼儿用品——这就是序列模式，可以提前推荐。</p><p><strong>聚类分析</strong>——把用户自动分组。不是你事先定义"高端用户""低端用户"，而是让算法自己发现用户自然分成了几群。</p><p><strong>分类</strong>——基于已知规则给新数据打标签。垃圾邮件过滤就是最典型的分类。</p><p><strong>偏差检测</strong>——发现异常值。某个用户突然大额消费，可能是盗刷，也可能是真实需求——异常值里藏着需求。</p><p><strong>预测</strong>——基于历史数据预测未来。电力需求预测、物流调配、销售预测。</p><p>找到需求后，怎么判断这个场景值不值得做？四个条件：有大量数据、体现个性化需求、用户能反馈结果、技术可实现且成本可控。缺一个都不行。</p><p>还有个黄金场景识别三法则：<em>痛点真实性</em>（客户是否已经在用低效方式解决？）、<em>AI不可替代性</em>（去掉AI后方案是否完全失效？）、<em>商业闭环可量化</em>（3个月内能算出ROI吗？）。</p><p>AI产品有个反直觉的原则：<em>不要100%解决，抓住主要场景痛点即可</em>。分类规则直接影响模型效果——分类太细数据少，分类太大有歧义数据混入。这是PM的核心决策。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>某AI客服团队遇到一个问题：用户问"我的订单到哪了"，系统总是回答不好。用偏差检测分析发现，<em>80%的问询集中在3个场景</em>：物流查询、退换货、优惠券使用。于是PM决定只做这3个场景的精准回答，其他场景转人工。结果：自动解决率从40%提升到75%，用户满意度反而更高——因为回答更准了。</p></div></div>',think:['用黄金场景三法则评估你身边的一个AI产品，它是黄金场景吗？','为什么"不要100%解决"反而效果更好？这和传统产品思维有什么不同？'],memory:['关联分析=发现"买A也买B"的关系（尿布与啤酒）','序列发现=发现"先做A后做B"的时间顺序（婴儿用品→幼儿用品）','聚类分析=让算法自动给用户分组，不事先定义','分类=基于已知规则给新数据打标签（垃圾邮件过滤）','偏差检测=发现异常值里藏的需求（突然大额消费=盗刷或新需求）','预测=基于历史数据预测未来（电力需求、销售预测）','好场景4条件：有大量数据+体现个性化+用户能反馈+技术成本可控','黄金场景三法则：痛点真实性+AI不可替代性+商业闭环可量化','不要100%解决，抓住主要场景痛点即可','分类太细→数据少，分类太大→有歧义，这是PM的核心决策']},
  {id:6,name:'AI技术知识速查',desc:'AI产品经理必须了解的核心技术概念',qIds:[1],why:'AI PM不需要会写代码，但必须理解技术原理，否则无法做技术决策。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>先说深度学习的5个核心算法，用最简单的方式理解：</p><p><strong>CNN（卷积神经网络）</strong>——像人眼一样看图。先看局部特征（边缘、纹理），再组合成整体（脸、车）。一层层提取：第一层认线条，第二层认形状，第三层认物体。</p><p><strong>RNN（循环神经网络）</strong>——有记忆的网络。读一句话时，它会把前面词的意思"记住"，带到后面的理解中。但有个致命问题：短期记忆——太长的句子，前面的内容就忘了。</p><p><strong>LSTM（长短期记忆网络）</strong>——RNN的升级版，加了"门"机制。想象三个门卫：遗忘门（决定忘掉什么）、输入门（决定记住什么）、输出门（决定输出什么）。这样就能记住长距离的依赖关系了。</p><p><strong>GANs（生成对抗网络）</strong>——两个网络互相博弈。生成器负责造假，判别器负责鉴别。生成器越造越真，判别器越鉴越严，最终生成器能造出以假乱真的内容。</p><p><strong>RL（强化学习）</strong>——通过试错学习。就像训练狗：做对了给奖励，做错了没奖励。AlphaGo就是用强化学习，自己和自己下了几千万盘棋，最终战胜人类。</p><p>再说语音交互的指标体系——这是AI PM必须懂的：</p><p>ASR（语音识别）看WER（词错误率）和SER（句错误率）。WER 5%意味着每20个词错1个，听起来还行，但在客服场景可能意味着关键信息识别错误。</p><p>对话系统看CPS（平均对话轮数）和求助人工比例。CPS越高说明用户愿意聊，但太高也可能说明AI没解决问题。求助人工比例越低越好，但降到0不现实——关键是把比例降到商业可行。</p><p>最后记住一个关键洞察：<em>NLP是AI发展的核心瓶颈</em>。深度学习对语音和图像识别的提升是10-20%，但对NLP只有1-2%。因为语言是人类近几千年才发展出来的符号能力，和哺乳动物几百万年进化出来的视觉听觉能力本质不同。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>某智能音箱团队发现唤醒率只有92%，用户抱怨"叫它不应"。PM分析后发现：误唤醒率和唤醒率是矛盾的——提高唤醒率，误唤醒也增加（半夜突然说话）。最终方案：<em>唤醒词从2音节改为3音节</em>（"小爱同学"比"小爱"误唤醒率低70%），同时优化远场拾音算法。唤醒率提升到97%，误唤醒率反而下降。</p></div></div>',think:['如果你要做一个智能客服产品，WER 5%够用吗？什么场景下不够？','为什么NLP是AI瓶颈？这对AI PM的产品设计有什么影响？'],memory:['CNN=像人眼看图，一层层从线条→形状→物体','RNN=有记忆的网络，但短期记忆问题严重，长句子前面就忘了','LSTM=RNN升级版，三个门卫控制：遗忘门（忘什么）、输入门（记什么）、输出门（输出什么）','GANs=生成器造假+判别器鉴别，互相博弈直到以假乱真','RL=试错学习，做对给奖励做错没奖励（AlphaGo自己下了几千万盘）','WER=词错误率，5%=每20个词错1个，客服场景可能不够','CPS=平均对话轮数，高=用户愿意聊，太高=AI没解决问题','NLP是AI核心瓶颈：深度学习对语音/图像提升10-20%，对NLP只提升1-2%','唤醒词≥3音节误唤醒率比2音节低70%']},
  {id:7,name:'大模型技术选型',desc:'大模型技术选型的决策框架和实践方法',qIds:[2,3,5,6,34,35],why:'大模型时代，技术选型是AI PM最重要的决策之一。选错了，成本失控、效果不达标。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>大模型技术选型，核心是回答一个问题：你的产品需要模型做什么？</p><p>如果只是让模型按你的要求回答问题——用<strong>Prompt Engineering</strong>就够了。成本最低，不需要改模型，只要写好提示词。比如"你是一个有10年经验的金融分析师，请用非技术语言解释这个概念"。</p><p>如果需要模型参考最新资料回答——用<strong>RAG</strong>。想象考试：纯大模型=闭卷考试，RAG=开卷考试。RAG先从知识库中检索相关文档，再基于文档生成回答。好处是答案可溯源、信息可更新。代价是需要向量数据库（Milvus/FAISS）和检索策略设计。</p><p>如果需要模型在某个领域变得专业——用<strong>Fine-tuning</strong>。相当于考前强化培训。需要大量标注数据和计算资源，成本最高。但效果最好——模型的行为、风格、专业度都会改变。</p><p><strong>LoRA</strong>是Fine-tuning的平价版。只更新模型中很少的参数，成本大幅降低，效果也不错。适合预算有限但需要领域适配的场景。</p><p>还有两个重要的成本控制技术：<strong>MoE</strong>（混合专家系统）把大模型拆成多个小专家，按需调用，节省算力但路由策略复杂；<strong>量化</strong>（4bit/8bit）把模型参数从32位压缩到4位或8位，推理成本降50-75%，精度损失通常不到2%。</p><p>最关键的决策：RAG vs Fine-tuning。简单记：<em>需要最新信息+可溯源→RAG；需要改模型行为+领域术语→Fine-tuning</em>。实际项目中，最好的方案往往是两者结合——先用Fine-tuning让模型懂行业，再用RAG让它能查最新资料。</p><p>还有一个很实际的问题：做AI Agent，框架选错了可能白忙三个月。果果姐对比了四大主流框架：</p><p><strong>LangChain</strong>——功能最全，抽象层次多，版本更新快，适合做Demo和快速验证想法。但维护成本高，生产环境不太推荐，因为版本一升级你的代码可能就跑不通了。</p><p><strong>LangGraph</strong>——可视化Agent流程，适合复杂工作流。比如你的Agent需要多个步骤、有条件分支、需要人工审批节点——LangGraph能把流程画出来，一目了然。但学习门槛高，依赖LangChain生态。</p><p><strong>Pydantic AI</strong>——简单易用，类似FastAPI的设计哲学，适合轻量业务Agent。如果你的Agent不需要复杂工作流，只是"接收请求→调模型→返回结果"，Pydantic AI就够了。</p><p><strong>Claude SDK</strong>——没有额外抽象层，直接和Claude模型交互，适合发挥模型最大能力。但和Anthropic生态绑定深，换模型就要重写。</p><p>选框架的核心原则：<em>不要为了用框架而用框架。先想清楚你的Agent要解决什么问题，再选最简单的方案</em>。Demo用LangChain快速验证，复杂工作流用LangGraph，轻量业务用Pydantic AI，追求模型能力用Claude SDK。</p><p>Agent推理延迟也是实战中常见的问题。五个优化方案：</p><p><strong>砍</strong>——设置思考限制和提前停止。不是每个问题都需要AI反复反思和校验，简单问题直接给答案。</p><p><strong>控</strong>——使用摘要和关键信息提取，减少上下文窗口中的冗余信息。给AI看的资料越精简，响应越快。</p><p><strong>分</strong>——简单任务用小模型，复杂任务用大模型，大小模型协同作战。80%的常规问题用轻量模型秒回，20%的复杂问题才调大模型。</p><p><strong>存</strong>——缓存高频查询和固定规则的结果。同样的问题问第二遍，直接返回缓存答案，不调模型。</p><p><strong>并</strong>——将串行任务改为并行执行。三个独立子任务不需要排队，同时跑，总时间取决于最慢的那个。</p><p>还要注意数据漂移和模型漂移。数据漂移=用户行为变了（比如疫情后消费习惯大变），用PSI指标监控。模型漂移=模型效果随时间下降，需要实时跟踪核心指标，定期重训练。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>招商证券做AI编码助手，选了私有化部署+Fine-tuning方案。为什么不用RAG？因为<em>代码生成需要模型"内化"编程风格和公司代码规范</em>，RAG只能检索参考，不能改变模型行为。结果：开发效率提升40%，代码错误率下降30%。</p><p>某制造业RAG平台，用端侧+云侧混合部署：简单的高频查询用端侧轻量模型处理（快、便宜），复杂问题才调云端大模型（贵但强）。单客户月均推理成本从2000元降到300元以内，年客单价稳定在8万。</p></div></div>',think:['如果你做一个"AI法律顾问"产品，用RAG还是Fine-tuning？还是两者结合？为什么？','数据漂移在你的业务场景中可能怎么表现？怎么提前发现？'],memory:['Prompt Engineering=写好提示词让模型按要求回答，成本最低不改模型','RAG=开卷考试，先从知识库检索再回答，好处是可溯源可更新','Fine-tuning=考前强化培训，需要大量标注数据，成本最高但效果最好','LoRA=平价版Fine-tuning，只更新很少参数，成本大幅降低','量化(4bit/8bit)=压缩模型参数，推理成本降50-75%，精度损失<2%','RAG vs Fine-tuning决策：需最新信息+可溯源→RAG，需改行为+领域术语→Fine-tuning','数据漂移=用户行为变了（如疫情后消费习惯大变），用PSI指标监控','模型漂移=模型效果随时间下降，需实时跟踪核心指标+定期重训练','LangChain=功能最全适合Demo验证，但维护成本高生产环境不推荐','LangGraph=可视化Agent流程适合复杂工作流，但学习门槛高依赖LangChain生态','Pydantic AI=简单易用适合轻量业务Agent，类似FastAPI设计哲学','Claude SDK=无抽象层直接交互发挥模型最大能力，但和Anthropic绑定深','选框架核心原则=先想清楚问题再选最简方案，不要为了用框架而用框架','Agent推理延迟五字诀：砍(限制思考)/控(摘要提取)/分(大小模型协同)/存(缓存)/并(并行执行)']},
  {id:8,name:'模型幻觉与容错设计',desc:'AI产品容错机制设计的核心方法论',qIds:[4,8,29],why:'大模型会"一本正经地胡说八道"，这是AI产品最大的风险。不管理幻觉，产品就不可能上线。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>模型幻觉就是：大模型生成的内容看起来很合理，但其实是错的。比如AI告诉你"爱因斯坦在1955年获得了诺贝尔奖"——听起来像真的，但他实际是1921年获得的。</p><p>为什么会产生幻觉？因为大模型的本质是"预测下一个词"，<em>它追求的是"看起来合理"，不是"事实正确"</em>。它不知道自己在说什么，只是在统计意义上选择最可能的下一个词。</p><p>怎么管理幻觉？不是消除它（目前做不到），而是控制它的影响。</p><p>产品设计层面三件套：<strong>置信度展示</strong>（告诉用户AI有多确定）、<strong>人工复核通道</strong>（不确定的转人工）、<strong>免责声明</strong>（明确AI可能出错）。</p><p>技术层面三件套：<strong>RAG检索增强</strong>（让AI基于真实文档回答，减少编造）、<strong>规则引擎兜底</strong>（关键场景用硬规则而非AI判断）、<strong>多模型交叉验证</strong>（两个AI都同意才输出）。</p><p>还有一个"反脆弱设计"的思路：不是让AI更强，而是让系统在AI出错时也不崩。比如金融风控：IF {AI输出置信度<85%} THEN {转人工审核}；IF {涉及用户生命财产安全} THEN {强制双AI交叉验证}。这样即使AI偶尔出错，也不会造成灾难性后果。</p><p>记住：Chatbot技术已经ready了，缺的不是技术，是在正确场景使用。<em>产品经理要评估的是：是没有落地条件，还是没有落地想象力？</em></p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>某医疗AI产品，临床采纳率只有38%。原因：医生不信任AI——AI给出诊断建议但没有解释为什么，医生不敢用。后来PM加了"置信度展示+推理过程展示+一键转人工"三个功能，<em>临床采纳率从38%提升到81%</em>。医生说："我不需要AI100%正确，我需要知道它有多确定，以及我能随时接管。"</p><p>某社交平台因为没内置内容审核模块，被处以全年营收4%的罚款。教训：<em>AI产品的伦理设计不是锦上添花，是法律底线</em>。</p></div></div>',think:['如果你做一个AI教育产品（给小学生辅导数学），幻觉管理策略应该怎么设计？','"反脆弱设计"和"容错设计"有什么区别？哪个更适合AI产品？'],memory:['幻觉=大模型一本正经地胡说八道，本质是追求"看起来合理"而非"事实正确"','产品层三件套：置信度展示（告诉用户AI有多确定）+人工复核通道+免责声明','技术层三件套：RAG检索增强（基于真实文档回答）+规则引擎兜底+多模型交叉验证','反脆弱设计：IF置信度<85% THEN转人工；IF涉及生命财产安全 THEN强制双AI验证','医疗AI案例：临床采纳率38%→81%，关键是加推理过程展示+一键转人工','Chatbot技术已ready，缺的是在正确场景使用的想象力']},
  {id:9,name:'商业化落地与成本控制',desc:'AI产品商业化策略和成本控制方法',qIds:[12,13,14,15,16,18],why:'67%的AI创新项目因为商业闭环缺失而失败。技术再好，赚不到钱就是零。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>AI产品从Demo到规模化营收，必须突破三个卡点：</p><p><strong>第一个卡点：场景闭环</strong>。大部分AI Demo只能解决单点碎片化痛点，无法融入用户的核心工作流。用户用完即走，没有持续付费的理由。比如AI笔记工具只能生成内容，但用户写完还要跳到石墨做协作、跳到飞书排日程——产品只覆盖了用户全流程10%的环节。反面教材：通义灵码为什么付费转化率高？因为它在IDE里打通了"需求拆解-代码生成-实时调试-安全漏洞检测-一键部署"全链路，开发者不用在多个工具间反复横跳。</p><p><strong>第二个卡点：单位经济模型</strong>。有用户有付费，但越卖越亏。一个功能单次调用大模型成本0.2元，用户日均使用100次，月成本600元，但产品月费只定了29元——永远跑不通盈利模型。<em>AI客服单次交互成本必须低于人工客服的30%才具备替代价值</em>。</p><p><strong>第三个卡点：规模化交付</strong>。每个客户都要定制，无法标准化交付，团队被定制需求拖垮。解决方案：端侧+云侧混合部署，简单高频查询用端侧轻量模型，复杂问题才调云端大模型。</p><p>B端和C端的商业化策略完全不同。B端按成果付费，续费率超80%，关键是ROI可视化——客户要看到"用了你的AI省了多少钱"。C端订阅制，付费率只有1-4%，关键是用户规模和社交传播。定价逻辑也不同：B端按节省的人力成本定价，C端按情绪价值和效率提升定价。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>某制造业RAG平台，针对工厂客户做了"端侧+云侧"混合部署：简单高频查询用端侧轻量模型（快、便宜），复杂问题调云端大模型（贵但强）。同时优化了文档分片与召回策略。<em>单客户月均推理成本从2000元降到300元以内</em>，年客单价稳定在8万。这个经济模型才跑得通。</p><p>反面案例：2025-2026年大量倒闭的泛娱乐AI工具，靠免费、无限制调用大模型换流量，短期用户暴涨，但推理成本完全失控，融资烧完直接关停。</p></div></div>',think:['算一算：如果一个AI客服产品，单次交互成本0.1元，日均10万次调用，月费定多少才能跑通经济模型？','为什么B端AI产品"按成果付费"比"按功能付费"更容易成交？'],memory:['场景闭环=单点功能可用→全链路价值闭环，用户不用在多个工具间跳转','单位经济模型=越卖越亏→单客户盈利可复制，AI客服成本需低于人工30%','规模化交付=每个客户都定制→标准化+可配置，端侧+云侧混合部署','B端=按成果付费+ROI可视化+续费率80%+，关键是让客户看到省了多少钱','C端=订阅制+付费率1-4%+社交传播，关键是用户规模和情绪价值','定价逻辑：B端按节省人力成本定价，C端按情绪价值/效率提升定价','端侧+云侧混合部署案例：推理成本从2000→300元/月','67%的AI项目因商业闭环缺失失败，技术可行≠商业可行']},
  {id:10,name:'面试实战与行为问题',desc:'AI PM面试的行为问题和项目表达技巧',qIds:[19,20,21,24],why:'AI PM面试和传统PM面试完全不同，面试官往往技术出身，能一眼看穿你是"背答案"还是"真正做过"。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>AI PM面试官核心验证三件事：你有没有真正参与过AI项目（不是旁观者）、你能不能把AI技术和业务目标打通（不是堆术语）、你的思维方式是否匹配AI项目的不确定性。</p><p>三大致命失误：</p><p><strong>术语堆砌</strong>——说了一堆ReAct/CoT/MCP/A2A，但追问"你们项目里具体怎么用的"就答不上来。面试官（往往技术出身）立刻判断你在背AI术语。</p><p><strong>有结果没过程</strong>——"效果提升了30%"，但说不出中间遇到的最大困难是什么、为什么这么选型、如果重来会怎么做。面试官会怀疑项目真实性。</p><p><strong>不认真准备行为问题</strong>——"你讲讲工作中的失败经历"，回答"没有特别失败的经历"或推给"团队失误"。这告诉面试官：你不会做项目复盘，自我认知深度不够。</p><p>面试准备的核心不是背答案，而是建立一套真实、可验证的面试认知体系。<em>每个项目经历都要准备好：你做了什么决策？为什么这么选？如果重来你会怎么做？中间最大的困难是什么？</em></p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>一个候选人面试时说"我推动了RAG系统上线，效果提升了20%"。面试官追问："这个20%是怎么测出来的？"候选人答不上来——因为他只参与了项目，没有参与指标设计。正确的回答应该是：<em>"我们定义了3个核心指标：回答准确率、用户满意度、人工干预率。A/B测试2周，回答准确率从65%提升到85%，人工干预率从40%降到15%。"</em></p></div></div>',think:['用STAR法则描述你最近的一个项目，然后加上"决策逻辑"和"如果重来"两个维度。','你能说出自己做过的3个失败决策吗？每个提炼出什么方法论？'],memory:['面试官验证3件事：真正参与过AI项目/能把技术和业务打通/思维方式匹配不确定性','术语堆砌=说了一堆ReAct/CoT/MCP但追问就答不上来，面试官立刻判断你在背术语','有结果没过程=只说"效果提升30%"但说不出中间困难和决策逻辑','不准备行为问题="没有特别失败的经历"=缺乏复盘能力和自我认知','每个项目准备4个维度：做了什么决策+为什么这么选+如果重来怎么做+中间最大困难','面试官往往技术出身，能一眼看穿"背答案"vs"真正做过"','效果指标必须说清怎么测的：A/B测试几周+具体指标+前后对比']},
  {id:11,name:'AI Agent落地实战',desc:'AI Agent的设计方法论和商业化路径',qIds:[10,28],why:'Agent是2025-2026年最热的AI产品形态，但失败率极高。这个板块教你如何避开坑。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>AI Agent项目失败的五大原因：</p><p><strong>第一，技术驱动幻觉</strong>——拿着锤子找钉子。团队掌握了先进的大模型技术，就满世界找可以被敲打的问题，而不是先研究客户真正需要什么。一个通用多模态Agent，什么都能做，但没人愿意付费——因为每个客户需要的是深度解决特定问题，不是"什么都能做但都不深"。</p><p><strong>第二，场景颗粒度失配</strong>——要么太泛要么太窄。"智能办公助手"太泛，没人知道它到底帮什么；"自动填表"太窄，价值不够支撑一个产品。黄金颗粒度是：一个具体但有价值的工作流。</p><p><strong>第三，价值闭环缺失</strong>——技术可行但商业不通。Demo很惊艳，但客户不愿意付费。因为Demo解决的是"技术能不能做"，不是"客户愿不愿意付钱"。</p><p><strong>第四，人机协作设计失败</strong>——要么全自动化要么全人工。医疗AI全自动诊断是合规灾难，全人工又失去了AI的价值。正确做法是<em>20-60-20法则</em>：前20%人定义任务框架，中60%AI生成方案，后20%人做价值判断。</p><p><strong>第五，数据飞轮未建立</strong>——模型无法持续优化。上线后效果持续衰减，因为没有机制把用户反馈转化为训练数据。</p><p>多级Agent架构是当前最成熟的模式：初级AI处理80%常规咨询→复杂问题自动触发专家模型→争议场景无缝转接人工→所有交互生成知识图谱用于持续优化。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>某电商客服升级案例：初级AI处理80%的常规咨询（物流查询、退换货政策等），平均响应时间从30秒降到2秒。复杂问题（如"我收到的商品和描述不符怎么办"）自动触发专家模型，生成解决方案建议供人工客服参考。争议场景（如用户情绪激动）无缝转接人工，同时AI已经整理好了对话摘要。所有交互数据进入知识图谱，用于持续优化模型。结果：<em>人工客服工作量减少60%，用户满意度提升25%</em>。</p><p>金融风控Agent案例：某银行将风控模型响应时间从6小时压缩至8分钟。关键不是模型多快，而是产品设计：简单交易实时自动审批，中等风险交易AI给出建议+人工确认，高风险交易强制人工审核+AI辅助分析。</p></div></div>',think:['如果你做一个AI Agent，选什么场景？用黄金场景三法则验证一下。','20-60-20法则在你的工作场景中怎么应用？哪些环节应该人做，哪些应该AI做？'],memory:['技术驱动幻觉=拿着锤子找钉子，通用Agent什么都能做但没人付费','场景颗粒度失配=太泛（智能办公助手）或太窄（自动填表），黄金颗粒度=具体但有价值的工作流','价值闭环缺失=Demo惊艳但没人付费，解决的是"能不能做"不是"愿不愿意付钱"','人机协作失败=全自动（合规灾难）或全人工（失去AI价值），正确做法是20-60-20','20-60-20法则：前20%人定义框架→中60%AI生成→后20%人做价值判断','数据飞轮=用户行为→优化模型→提升体验→更多用户→更多数据，没有它效果持续衰减','多级Agent架构：80%常规AI处理→复杂触发专家模型→争议转人工→知识图谱持续优化','产品是总结出来的不是设计出来的，先做解决方案再总结系统']},
  {id:12,name:'AI就业能力与FDE新岗位',desc:'大模型应用开发的核心能力与FDE等新岗位机会',qIds:[31,32],why:'学了一堆Agent、RAG、MCP，投简历却一面都拿不到？因为这个行业真正值钱的不是你会多少技术名词，而是你能不能把AI能力转化为解决业务问题的能力。',content:'<div class="section-block"><div class="section-label"><span class="dot"></span>核心概念</div><div class="section-content"><p>果果姐（前大厂AI产品负责人）说了一个扎心的事实：<em>AI行业存在严重的"学非所需"现象</em>。你学了Agent、RAG、MCP，面试官问的是"你做过什么落地项目？效果怎么评测的？出了badcase怎么处理？"——你答不上来。</p><p>真正值钱的大模型应用开发工程师需要四大核心能力：</p><p><strong>任务拆解能力</strong>——把一个模糊的业务需求拆成AI可以执行的子任务。比如"做一个智能客服"不是需求，"识别用户意图→检索知识库→生成回答→判断是否转人工"才是拆解后的任务。拆不好，后面的技术再强也白搭。</p><p><strong>工具调用能力</strong>——让AI知道什么时候该调哪个工具。不是给AI一堆API让它自己选，而是设计好调用逻辑：什么条件下调搜索、什么条件下调数据库、什么条件下调计算引擎。</p><p><strong>评测和可观测性</strong>——这是最容易忽略的能力。AI系统上线后，关键节点必须能追踪、回放和调试。不是"上线了就完了"，而是要持续监控：回答准确率有没有下降？用户满意度有没有变化？哪些问题AI处理不了？</p><p><strong>生产环境能力</strong>——包括状态管理（对话中断后能恢复）、断点恢复（出错后能从断点继续）、日志监控（每个决策都有记录）、风险防护（异常输入不会让系统崩溃）、成本优化（不是每次都调最贵的模型）。</p><p>还有一个新岗位叫<em>FDE（Field Deployment Engineer）</em>，果果姐认为是产品经理和传统开发的绝佳转行出路。FDE兼顾产品思维与AI落地能力——不是写代码的人，也不是画原型的人，而是能把AI产品真正交付到客户现场的人。这个岗位的核心要求是：懂业务场景+懂AI技术边界+能做落地交付。</p><p>数字化红利也不属于开发岗。精通ERP、CRM的方案专家比纯开发更稀缺，因为业务理解能力才是AI落地的关键。<em>隐性知识——那些你在行业里泡了几年才知道的"坑"和"窍门"——比任何技术模型都值钱</em>。</p></div></div><div class="section-block"><div class="section-label"><span class="dot"></span>真实案例</div><div class="section-content"><p>果果姐拆了200+份AI岗位JD，发现一个规律：面试官问的不是"你会什么技术"，而是"你做过什么项目、怎么做的、效果怎样、遇到什么问题"。一个候选人简历写了"精通RAG、Agent、多模态"，面试官追问"你们的RAG检索策略是什么？召回率多少？badcase怎么处理？"——候选人答不上来，一面就挂了。另一个候选人只写了"做了XX行业RAG客服系统，回答准确率从65%提升到85%，人工干预率从40%降到15%"，面试官立刻来了兴趣。</p></div></div>',think:['你现在的技能在"四大核心能力"中，哪个最强？哪个最弱？怎么补？','FDE岗位和传统PM有什么区别？你适合吗？'],memory:['四大核心能力：任务拆解（把需求拆成AI可执行子任务）/工具调用（设计AI何时调哪个工具）/评测可观测性（追踪+回放+调试）/生产环境能力（状态管理+断点恢复+成本优化）','学非所需现象：学了Agent/RAG/MCP但面试问的是落地项目和badcase处理','FDE=Field Deployment Engineer，兼顾产品思维与AI落地交付能力','数字化红利不属于开发岗，精通ERP/CRM的方案专家更稀缺','隐性知识比技术模型值钱：行业里泡几年才知道的"坑"和"窍门"','面试核心：不是"你会什么技术"，而是"你做过什么项目+怎么做的+效果怎样"']}
];

var SPACED_REPEAT = [1,3,7,14];

function store(k,v){localStorage.setItem('ai-pm-'+k,JSON.stringify(v))}
function load(k){try{return JSON.parse(localStorage.getItem('ai-pm-'+k))}catch(e){return null}}
function today(){return new Date().toISOString().slice(0,10)}
function stars(n){return '★'.repeat(n)+'☆'.repeat(5-n)}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function hashStr(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}

function updateTopProgress(){
  var prog=load('path-progress')||{};
  var mastered=0;
  PATHS.forEach(function(p){if(prog[p.id]&&prog[p.id].status==='mastered')mastered++});
  document.getElementById('top-mastered').textContent=mastered;
  document.getElementById('top-bar').style.width=Math.round(mastered/12*100)+'%';

  var records=load('checkin-records')||[];
  var streak=0;
  var d=new Date();
  for(var i=0;i<365;i++){
    var ds=d.toISOString().slice(0,10);
    if(records.indexOf(ds)>=0){streak++;d.setDate(d.getDate()-1)}
    else break;
  }
  document.getElementById('top-streak').textContent=streak;

  var history=load('quiz-history')||[];
  if(history.length>0){
    var total=history.length;
    var correct=history.filter(function(h){return h.score>=3}).length;
    document.getElementById('top-accuracy').textContent=Math.round(correct/total*100);
  }else{
    document.getElementById('top-accuracy').textContent='0';
  }
}

document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
    document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active')});
    t.classList.add('active');
    document.getElementById('page-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='checkin') renderCheckin();
    if(t.dataset.tab==='path') renderPaths();
    if(t.dataset.tab==='assess') drawRadar();
    if(t.dataset.tab==='wrong') renderWrongBook();
    updateTopProgress();
  });
});

var scores = load('assess') || {tech:3,product:3,biz:3,data:3,translate:3,agent:3,ethics:3,interview:3};

function renderSliders(){
  var html='';
  DIMS.forEach(function(d){
    html+='<div class="slider-group"><div class="slider-label"><span>'+d.name+'</span><span class="score" id="score-'+d.id+'">'+scores[d.id]+'</span></div><input type="range" min="1" max="5" step="1" value="'+scores[d.id]+'" data-dim="'+d.id+'" oninput="onSlider(this)"></div>';
  });
  document.getElementById('sliders').innerHTML=html;
  drawRadar();
  updateAnalysis();
}

function onSlider(el){
  var dim=el.dataset.dim;
  scores[dim]=parseInt(el.value);
  document.getElementById('score-'+dim).textContent=el.value;
  drawRadar();
  updateAnalysis();
}

function drawRadar(){
  var canvas=document.getElementById('radar');
  var ctx=canvas.getContext('2d');
  var w=canvas.width,h=canvas.height;
  var cx=w/2,cy=h/2;
  var r=Math.min(w,h)/2-40;
  ctx.clearRect(0,0,w,h);
  var n=DIMS.length;
  var angleStep=Math.PI*2/n;
  var startAngle=-Math.PI/2;
  for(var ring=1;ring<=5;ring++){
    var rr=r*ring/5;
    ctx.beginPath();
    for(var i=0;i<n;i++){
      var a=startAngle+i*angleStep;
      var x=cx+rr*Math.cos(a);
      var y=cy+rr*Math.sin(a);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle=ring===5?'#3d4162':'#2d3148';
    ctx.lineWidth=1;
    ctx.stroke();
  }
  for(var i=0;i<n;i++){
    var a=startAngle+i*angleStep;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='#2d3148';
    ctx.lineWidth=1;
    ctx.stroke();
    var lx=cx+(r+22)*Math.cos(a);
    var ly=cy+(r+22)*Math.sin(a);
    ctx.fillStyle='#9499b3';
    ctx.font='11px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    var shortName=DIMS[i].name.length>5?DIMS[i].name.slice(0,5):DIMS[i].name;
    ctx.fillText(shortName,lx,ly);
  }
  ctx.beginPath();
  for(var i=0;i<n;i++){
    var a=startAngle+i*angleStep;
    var v=scores[DIMS[i].id]/5;
    var x=cx+r*v*Math.cos(a);
    var y=cy+r*v*Math.sin(a);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(108,92,231,0.25)';
  ctx.fill();
  ctx.strokeStyle='#6c5ce7';
  ctx.lineWidth=2;
  ctx.stroke();
  for(var i=0;i<n;i++){
    var a=startAngle+i*angleStep;
    var v=scores[DIMS[i].id]/5;
    var x=cx+r*v*Math.cos(a);
    var y=cy+r*v*Math.sin(a);
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI*2);
    ctx.fillStyle='#a29bfe';
    ctx.fill();
  }
}

function updateAnalysis(){
  var entries=DIMS.map(function(d){return{id:d.id,name:d.name,score:scores[d.id]}});
  entries.sort(function(a,b){return a.score-b.score});
  var min=entries[0];
  var avg=(entries.reduce(function(s,e){return s+e.score},0)/entries.length).toFixed(1);
  var strong=entries.filter(function(e){return e.score>=4});
  var weak=entries.filter(function(e){return e.score<=2});
  var html='平均分：<strong>'+avg+'</strong> / 5';
  if(weak.length>0){
    html+='<br>短板：<strong>'+weak.map(function(e){return e.name+'('+e.score+'分)'}).join('、')+'</strong>';
    html+='<br>建议优先提升短板维度，可结合学习路径中对应板块进行针对性学习';
  }
  if(strong.length>0){
    html+='<br>优势：<strong>'+strong.map(function(e){return e.name+'('+e.score+'分)'}).join('、')+'</strong>';
  }
  document.getElementById('analysis').innerHTML=html;
}

function nextQuestion(){
  var scoreEl=document.getElementById('q-self-score');
  var score=scoreEl?parseInt(scoreEl.value):3;
  quizState.scores.push(score);
  var q=quizState.questions[quizState.idx];
  var history=load('quiz-history')||[];
  history.push({id:q.id,score:score,date:today(),q:q.q,cat:q.cat,pathId:q.pathId});
  store('quiz-history',history);

  if(score<=2){
    var wrongBook=load('wrong-book')||[];
    var exists=wrongBook.some(function(w){return w.id===q.id&&w.date===today()});
    if(!exists){
      wrongBook.push({id:q.id,score:score,date:today(),q:q.q,cat:q.cat,pathId:q.pathId});
      store('wrong-book',wrongBook);
    }
    var prog=load('path-progress')||{};
    if(prog[q.pathId]){
      var kpStatuses=prog[q.pathId].kpStatus;
      var anyReview=prog[q.pathId].kpStatus.some(function(s){return s==='review'});
      if(!anyReview){
        for(var i=0;i<kpStatuses.length;i++){
          if(kpStatuses[i]==='mastered'){kpStatuses[i]='review';break}
        }
      }
      prog[q.pathId].status='learning';
      store('path-progress',prog);
      pathProgress=prog;
    }
  }

  quizState.idx++;
  if(quizState.idx>=quizState.questions.length){
    finishQuiz();
  }else{
    quizState.seconds=0;
    renderQuizQuestion();
  }
}

  html+='</div>';
  html+='<div style="margin-top:12px">';
  quizState.questions.forEach(function(q,i){
    var isWrong=quizState.scores[i]<=2;
    var pathInfo=PATHS.find(function(p){return p.id===q.pathId});
    html+='<div class="result-item"><span>'+q.q.slice(0,30)+(q.q.length>30?'...':'')+'</span>';

function getStreak(){
  var records=load('checkin-records')||[];
  if(records.length===0)return 0;
  var streak=0;
  var d=new Date();
  for(var i=0;i<365;i++){
    var ds=d.toISOString().slice(0,10);
    if(records.indexOf(ds)>=0){streak++;d.setDate(d.getDate()-1)}
    else break;
  }
  return streak;
}

  el.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:999;animation:fadeIn .3s';
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},2000);
}

renderSliders();
renderPaths();
renderCheckin();
updateTopProgress();
</script>
